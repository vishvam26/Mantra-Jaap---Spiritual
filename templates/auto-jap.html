<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Jaap</title>
    <style>
        body { background: #00101a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        #count { font-size: 6rem; font-weight: bold; margin: 30px 0; }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; background: #00b4d8; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Auto-Jap Mode</h2>
    <div id="count">0</div>
    <button class="btn" id="start-btn" onclick="toggleJap()">Start Jaap</button>
    <br><br>
    <a href="/" onclick="saveToDB()" style="color:#00b4d8; font-weight: bold; text-decoration: none;">SAVE & EXIT</a>

    <script>
        const userId = localStorage.getItem('jap_user_id');
        let count = 0, dbTotal = 0, playing = false, inv;

        window.onload = async () => {
            const r = await fetch(`/get_count?user_id=${userId}`);
            const d = await r.json();
            count = d.current_count; dbTotal = d.total_count;
            document.getElementById('count').innerText = count;
            localStorage.setItem('start_c', count);
        };

        function toggleJap() {
            if (playing) {
                clearInterval(inv);
                saveToDB();
            } else {
                inv = setInterval(() => {
                    count++; document.getElementById('count').innerText = count;
                }, 900);
            }
            playing = !playing;
        }

        function saveToDB() {
            const diff = count - (parseInt(localStorage.getItem('start_c')) || 0);
            fetch('/update_count', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, current_count: count, total_count: dbTotal + diff })
            });
        }
    </script>
</body>
</html>
