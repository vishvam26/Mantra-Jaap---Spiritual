<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mantra Jaap - Spiritual</title>
    <style>
        :root { --bg: linear-gradient(135deg, #00101a 0%, #01497c 100%); --p: #00b4d8; --glass: rgba(255, 255, 255, 0.12); --text: #e1f5fe; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        #count-num { font-size: 5rem; margin: 10px 0; color: white; font-weight: bold; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; width:100%; max-width:350px; font-weight: bold;">
        <span>🔥 Streak: <span id="streak">0</span></span>
        <span>🏆 Total: <span id="total-c">0</span></span>
    </div>

    <div class="card" style="margin-top:20px;">
        <h2 id="mantra-title">Radha Radha</h2>
        <div id="count-num">0</div>
        <button class="btn" onclick="handleJap()">JAP KARO</button>
    </div>

    <div style="margin:20px;">
        <a href="auto-jap.html" style="color:var(--p); text-decoration:none; font-weight:bold;">Auto-Jap Mode →</a>
    </div>

    <script>
        // દરેક ફોન માટે અલગ ID જનરેટ થશે
        let userId = localStorage.getItem('jap_user_id');
        if (!userId) {
            userId = 'u_' + Math.random().toString(36).substr(2, 9) + Date.now();
            localStorage.setItem('jap_user_id', userId);
        }

        let curr = 0, total = 0;

        window.onload = () => {
            fetch(`/get_count?user_id=${userId}`)
                .then(r => r.json())
                .then(d => {
                    curr = d.current_count; total = d.total_count;
                    document.getElementById('count-num').innerText = curr;
                    document.getElementById('total-c').innerText = total;
                    document.getElementById('streak').innerText = d.streak || 0;
                });
        };

        function handleJap() {
            curr++; total++;
            document.getElementById('count-num').innerText = curr;
            document.getElementById('total-c').innerText = total;
            save();
        }

        function save() {
            fetch('/update_count', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, current_count: curr, total_count: total })
            });
        }
    </script>
</body>
</html>
