<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radha Radha | Auto jaap</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #00101a 0%, #012a4a 50%, #01497c 100%);
            --glow-color: rgba(225, 245, 254, 0.4);
            --text-color: #e1f5fe;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.12);
            --btn-bg: linear-gradient(to right, #01497c, #012a4a);
        }

        .light-mode {
            --bg-grad: linear-gradient(135deg, #fff9e6 0%, #ffecb3 50%, #ffd54f 100%);
            --glow-color: rgba(255, 215, 0, 0.5);
            --text-color: #5d4037;
            --accent: #ff8f00;
            --glass: rgba(255, 255, 255, 0.4);
            --btn-bg: linear-gradient(to right, #ffa000, #ff6f00);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            transition: 0.5s;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-grad);
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 35px;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            color: var(--text-color);
        }

        .card-active-effect {
            animation: kailashBreathe 2.2s infinite alternate ease-in-out;
        }

        @keyframes kailashBreathe {
            to {
                transform: translate(-50%, -50%) scale(1.03);
                box-shadow: 0 0 55px var(--glow-color);
            }
        }

        .mantra-title {
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--glow-color);
        }

        .circle-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }

        .count-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 75px;
            font-weight: 800;
        }

        svg {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease;
            stroke: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .goal-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        #goal-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: 0.5s;
            box-shadow: 0 0 10px var(--accent);
        }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .main-btn {
            padding: 14px 0;
            border-radius: 50px;
            border: none;
            background: var(--btn-bg);
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            opacity: 0.7;
            font-weight: bold;
        }

        .snowflake {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="bg-layer"></div>

    <div class="glass-card" id="main-card">
        <div class="mantra-title">Radha Radha</div>
        <div style="font-size: 11px; opacity: 0.6; margin-top: -5px;">Eternal Peace Mode</div>

        <div class="circle-container">
            <svg height="200" width="200">
                <circle stroke="rgba(128,128,128,0.1)" stroke-width="12" fill="transparent" r="90" cx="100" cy="100" />
                <circle class="progress-ring__circle" id="progress-circle" stroke-width="12" stroke-dasharray="565.48"
                    stroke-dashoffset="565.48" fill="transparent" r="90" cx="100" cy="100" />
            </svg>
            <div class="count-num" id="count-display">0</div>
        </div>

        <div style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">MALA PROGRESS</div>
        <div class="goal-container">
            <div id="goal-bar"></div>
        </div>
        <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">
            Maala Count: <span id="mala-count" style="color:var(--accent); font-weight:bold;">0</span>
        </div>

        <div class="controls">
            <button class="main-btn" id="start-btn" onclick="toggleJap()">Start Jaap</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Change Theme</button>
        </div>

        <a href="javascript:void(0)" onclick="exitSession()"
            style="color: var(--accent); text-decoration: none; font-size: 11px; display: block; margin-top: 25px; opacity: 0.5;">SAVE
            & EXIT</a>
    </div>

    <audio id="auto-audio" loop src="/static/audio/auto.mp3"></audio>

    <script>
        let audioPlayer = document.getElementById('auto-audio');
        let count = 0;           // Aa session na current counts
        let dbTotalCount = 0;    // Database mathi aavela total counts
        let isPlaying = false;
        let counterInterval;

        // 1. Page load thay tyare Database mathi latest counts lai aavo
        document.addEventListener('DOMContentLoaded', async () => {
            // LocalStorage mathi turant data batavo (Optional for UI speed)
            count = parseInt(localStorage.getItem('jap_curr')) || 0;
            document.getElementById('count-display').innerText = count;
            document.getElementById('mala-count').innerText = Math.floor(count / 108);
            updateProgress();

            await loadDataFromDB();
        });

        async function loadDataFromDB() {
            try {
                const response = await fetch('/get_count');
                const d = await response.json();

                if (d.current_count !== undefined) {
                    count = parseInt(d.current_count);
                    dbTotalCount = parseInt(d.total_count); // Database no total count store karo

                    document.getElementById('count-display').innerText = count;
                    document.getElementById('mala-count').innerText = Math.floor(count / 108);
                    updateProgress();
                }
            } catch (err) {
                console.error("Data load karva ma bhul chhe:", err);
            }
        }

        // 2. Jaap Sharu karvanu function (Local Audio sathe)
        function startJap() {
            if (isPlaying) return;

            // Audio play karo
            if (audioPlayer) {
                audioPlayer.play().catch(err => console.error("Audio play error:", err));
            }

            isPlaying = true;
            document.getElementById('main-card').classList.add('card-active-effect');
            document.getElementById('start-btn').innerText = "Pause Session";

            counterInterval = setInterval(() => {
                count++;
                // Navo total = Database no total + current session ma jetla vadhiya te
                // Note: Ahi logic badlavo padshe jethi count double na thay
                // Pan saraltat mate, dar vakhte live update kariye:

                document.getElementById('count-display').innerText = count;
                localStorage.setItem('jap_curr', count);

                // Dar 1 count par database update karvu hoy to (Optional):
                // saveToDB(count, dbTotalCount + 1); 

                if (count % 108 === 0) {
                    document.getElementById('mala-count').innerText = Math.floor(count / 108);
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }

                updateProgress();
                spawnSnowflake();
            }, 850); // Tamari audio file ni speed mujab aane adjust kari shako (e.g. 1000ms)
        }



        function stopJap() {
            isPlaying = false;
            if (audioPlayer) audioPlayer.pause();
            document.getElementById('main-card').classList.remove('card-active-effect');
            clearInterval(counterInterval);
            document.getElementById('start-btn').innerText = "Resume Jaap";

            // Stop thay tyare final save
            saveToDB();
        }

        // auto-jap.html ma saveToDB function replace karo
        function saveToDB() {
            // Navo total = Database mathi aavelo juno total + tame aaje karela total jap
            // Aa logic thi total count hamesha sahi rahese
            fetch('/update_count', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    current_count: count,
                    total_count: dbTotalCount + (count - (parseInt(localStorage.getItem('jap_curr_at_start')) || 0))
                })
            }).then(res => res.json())
                .then(data => console.log("Database Sync Done"));
        }

        // loadDataFromDB ma aa line umero
        async function loadDataFromDB() {
            try {
                const response = await fetch('/get_count');
                const d = await response.json();
                if (d.current_count !== undefined) {
                    count = parseInt(d.current_count);
                    dbTotalCount = parseInt(d.total_count);

                    // Session sharu thaya pehla no count save karo jethi calculation sahi thay
                    localStorage.setItem('jap_curr_at_start', count);

                    document.getElementById('count-display').innerText = count;
                    document.getElementById('mala-count').innerText = Math.floor(count / 108);
                    updateProgress();
                }
            } catch (err) { console.log(err); }
        }
        function toggleJap() {
            if (isPlaying) stopJap(); else startJap();
        }

        // 4. Exit karva mate
        function exitSession() {
            stopJap();
            setTimeout(() => {
                window.location.href = '/';
            }, 500);
        }

        // UI Progress Functions
        function updateProgress() {
            const circle = document.getElementById('progress-circle');
            const bar = document.getElementById('goal-bar');
            const p = (count % 108) / 108;
            const offset = 565.48 - (p * 565.48);
            if (circle) circle.style.strokeDashoffset = offset;
            if (bar) bar.style.width = (p * 100) + "%";
        }

        function spawnSnowflake() {
            const s = document.createElement('div');
            s.className = 'snowflake';
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = "-10px";
            let size = Math.random() * 5 + 2;
            s.style.width = size + "px"; s.style.height = size + "px";
            document.body.appendChild(s);
            s.animate([{ transform: 'translateY(0)', opacity: 0.6 }, { transform: 'translateY(110vh)', opacity: 0 }], { duration: 4000 });
            setTimeout(() => s.remove(), 4000);
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
    </script>
</body>

</html>
