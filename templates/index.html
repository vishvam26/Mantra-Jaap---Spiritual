<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mantra Jaap - Spiritual</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Crimson+Pro:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #00101a 0%, #012a4a 50%, #01497c 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --glow-color: rgba(225, 245, 254, 0.4);
            --accent: #ffffff;
            --text-color: #e1f5fe;
            --p: #00b4d8;
            --s: #90e0ef;
        }
        .light-mode {
            --glass: rgba(0, 0, 0, 0.05);
            --text-color: #2c3e50;
            --glow-color: rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-grad); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; transition: 0.5s; overflow-x: hidden; }
        .top-row { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .stat-card { background: var(--glass); padding: 8px 15px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; }
        .counter-ring { width: 220px; height: 220px; border-radius: 50%; border: 8px solid var(--glass); display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--glass); margin: 20px 0; box-shadow: 0 0 30px var(--glow-color); }
        #count-num { font-size: 5rem; font-weight: 800; margin: 0; color: var(--accent); }
        .jap-btn { background: linear-gradient(135deg, var(--p), var(--s)); color: white; border: none; padding: 18px; width: 100%; max-width: 320px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .bar { width: 12px; background: var(--p); border-radius: 5px 5px 0 0; min-height: 4px; }
        .report-grid { display: flex; justify-content: space-between; align-items: flex-end; height: 60px; margin-top: 10px; gap: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); color: var(--text-color); border: 1px solid var(--glass); }
    </style>
</head>
<body>
    <div class="top-row">
        <div class="stat-card">🔥 Streak: <span id="streak">0</span></div>
        <button onclick="toggleMode()" style="background:var(--glass); border:none; padding:8px; border-radius:50%; cursor:pointer;" id="mode-icon">🌙</button>
        <div class="stat-card">🏆 Total: <span id="total-c">0</span></div>
    </div>

    <div class="glass-card">
        <h1 id="mantra-title" style="margin:0; font-family:'Crimson Pro',serif; color:var(--p);">Radha Radha</h1>
        <select id="mantra-select" onchange="changeMantra()">
            <option value="Radha Radha" data-sound="radhe.mp3">Radha Radha</option>
            <option value="Om Namah Shivay" data-sound="shivay.mp3">Om Namah Shivay</option>
            <option value="Jay shree Ram" data-sound="ram.mp3">Jay shree Ram</option>
            <option value="Hare Krishna" data-sound="krishna.mp3">Hare Krishna</option>
        </select>
    </div>

    <div class="counter-ring" id="circle">
        <h2 id="count-num">0</h2>
        <span style="font-size:0.8rem; font-weight:700; opacity:0.6;">GOAL: <span id="goal-val">108</span></span>
    </div>

    <button class="jap-btn" onclick="handleJap()">JAP KARO</button>

    <div style="margin:20px; text-align:center;">
        <a href="auto-jap.html" style="color:var(--p); text-decoration:none; font-weight:bold;">Auto-Jap Mode →</a>
    </div>

    <div class="glass-card">
        <span style="font-size:0.75rem; font-weight:700; opacity:0.6;">WEEKLY ACTIVITY</span>
        <div class="report-grid" id="report-grid"></div>
    </div>

    <audio id="mantra-audio"></audio>

    <script>
        // Unique User ID Generation for Multi-user support
        let userId = localStorage.getItem('jap_user_id');
        if (!userId) {
            userId = 'u_' + Math.random().toString(36).substr(2, 9) + Date.now();
            localStorage.setItem('jap_user_id', userId);
        }

        let curr = 0, total = 0, goal = 108;
        const getBaseUrl = () => window.location.origin;

        window.onload = () => {
            fetch(`${getBaseUrl()}/get_count?user_id=${userId}`)
                .then(r => r.json())
                .then(d => {
                    curr = d.current_count;
                    total = d.total_count;
                    document.getElementById('count-num').innerText = curr;
                    document.getElementById('total-c').innerText = total;
                    document.getElementById('streak').innerText = d.streak || 0;
                    updateReport(d.history, d.today);
                });

            if(localStorage.getItem('darkMode') === 'false') toggleMode();
            changeMantra();
        };

        function handleJap() {
            curr++; total++;
            document.getElementById('count-num').innerText = curr;
            document.getElementById('total-c').innerText = total;
            const a = document.getElementById('mantra-audio');
            a.currentTime = 0; a.play().catch(()=>{});
            if(curr % goal === 0) confetti();
            save();
        }

        function save() {
            fetch(`${getBaseUrl()}/update_count`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, current_count: curr, total_count: total })
            });
        }

        function updateReport(history, today) {
            const grid = document.getElementById('report-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                let d = new Date(); d.setDate(d.getDate() - (6 - i));
                let dStr = d.toISOString().split('T')[0];
                let val = (dStr === today) ? curr : (history[dStr] || 0);
                let h = Math.min((val / goal) * 60, 60);
                grid.innerHTML += `<div style="display:flex; flex-direction:column; align-items:center; flex:1;"><div class="bar" style="height:${h}px"></div><span style="font-size:0.6rem; opacity:0.6;">${d.toLocaleDateString('en', {weekday:'short'})}</span></div>`;
            }
        }

        function toggleMode() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('darkMode', !isLight);
            document.getElementById('mode-icon').innerText = isLight ? "☀️" : "🌙";
        }

        function changeMantra() {
            const s = document.getElementById('mantra-select');
            document.getElementById('mantra-title').innerText = s.value;
            document.getElementById('mantra-audio').src = "/static/audio/" + s.options[s.selectedIndex].getAttribute('data-sound');
        }
    </script>
</body>
</html>
