<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mantra Jaap - Spiritual Tracker</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/static/logo.png">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Crimson+Pro:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Default: Kailash Dark Theme */
            --bg-grad: linear-gradient(135deg, #00101a 0%, #012a4a 50%, #01497c 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --glow-color: rgba(225, 245, 254, 0.4);
            --accent: #ffffff;
            --text-color: #e1f5fe;
            --p: #00b4d8;
            --s: #90e0ef;
        }

        .light-mode {
            --glass: rgba(0, 0, 0, 0.05);
            --text-color: #2c3e50;
            --glow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-grad);
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            transition: 0.5s ease;
            overflow-x: hidden;
        }

        .top-row {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .stat-card {
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        .mode-toggle {
            background: var(--glass);
            border: none;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .theme-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }

        .t-btn {
            flex: 1;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--glass);
            color: var(--text-color);
            backdrop-filter: blur(10px);
        }

        .t-btn.active {
            background: var(--p);
            color: white;
            border-color: var(--p);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .counter-ring {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 8px solid var(--glass);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--glass);
            margin: 15px 0;
            box-shadow: 0 0 30px var(--glow-color);
            animation: breathe 3s infinite alternate ease-in-out;
            position: relative;
        }

        @keyframes breathe {
            to {
                box-shadow: 0 0 50px var(--glow-color);
                transform: scale(1.02);
            }
        }

        #count-num {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0;
            text-shadow: 0 0 15px var(--glow-color);
        }

        .jap-btn {
            background: linear-gradient(135deg, var(--p), var(--s));
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            max-width: 320px;
            font-size: 1.6rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }

        .jap-btn:active {
            transform: scale(0.95);
        }

        .hold-reset {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #ef4444;
            background: none;
            color: #ef4444;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .report-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 60px;
            gap: 6px;
            margin-top: 10px;
        }

        .bar {
            width: 12px;
            background: var(--p);
            border-radius: 5px 5px 0 0;
            min-height: 4px;
            transition: 0.5s;
            box-shadow: 0 0 10px var(--p);
        }

        select,
        .in-box {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
        }

        .auto-link {
            padding: 10px 20px;
            background: var(--glass);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid var(--p);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .badge-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }

        .badge {
            font-size: 1.5rem;
            filter: grayscale(1);
            opacity: 0.3;
            transition: 0.5s;
        }

        .badge.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.2);
        }

        #bhakti-card-hidden {
            position: absolute;
            left: -9999px;
            width: 400px;
            height: 550px;
            background: var(--bg-grad);
            padding: 40px;
            text-align: center;
            border: 10px solid var(--p);
            border-radius: 30px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body id="main-body">

    <div class="top-row">
        <div class="stat-card">🔥 Streak: <span id="streak">0</span></div>
        <button class="mode-toggle" onclick="toggleMode()" id="mode-icon">🌙</button>
        <div class="stat-card">🏆 Total: <span id="total-c">0</span></div>
    </div>

    <div class="theme-tabs">
        <button class="t-btn active" id="btn-kailash" onclick="setT('kailash')">KAILASH</button>
        <button class="t-btn" id="btn-vrindavan" onclick="setT('vrindavan')">VRINDAVAN</button>
        <button class="t-btn" id="btn-ayodha" onclick="setT('ayodha')">AYODHYA</button>
    </div>

    <div class="glass-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <label style="font-size:0.7rem; font-weight:600;">Reminder:</label>
            <input type="time" id="notif-time" onchange="saveNotif()"
                style="border:none; background:rgba(255,255,255,0.1); color:var(--text-color); padding:5px; border-radius:8px;">
        </div>
        <h1 id="mantra-title" style="font-family:'Crimson Pro',serif; font-size: 2.2rem; margin: 10px 0; color: var(--p);">Radha Radha</h1>
        <select id="mantra-select" onchange="changeMantra()">
            <option value="Radha Radha" data-sound="radhe.mp3">Radha Radha</option>
            <option value="Om Namah Shivay" data-sound="shivay.mp3">Om Namah Shivay</option>
            <option value="Jay shree Ram" data-sound="ram.mp3">Jay shree Ram</option>
            <option value="Hare Krishna" data-sound="krishna.mp3">Hare Krishna</option>
        </select>
        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:0.85rem; font-weight:600;">Goal:</label>
            <input type="number" id="goal-input" class="in-box" value="108" min="108" onchange="updateGoal()" style="width:75px; margin:0;">
        </div>
        <div style="margin-top:15px; display:flex; align-items:center; gap:10px;">
            <button onclick="toggleBG()" id="bgm-btn" style="background:var(--p); color:white; border:none; padding:8px 12px; border-radius:10px;">🎵 OFF</button>
            <input type="range" min="0" max="1" step="0.1" value="0.2" style="flex:1;" oninput="setVol(this.value)">
        </div>
    </div>

    <div class="counter-ring" id="circle">
        <h2 id="count-num">0</h2>
        <span style="font-size:0.8rem; font-weight:700; opacity:0.6;">GOAL: <span id="goal-val">108</span></span>
    </div>

    <button class="jap-btn" onclick="handleJap()">JAP KARO</button>

    <div style="text-align: center;">
        <button class="hold-reset" id="reset-btn" onmousedown="startH()" onmouseup="stopH()" ontouchstart="startH()" ontouchend="stopH()">🔄</button>
        <p style="font-size:0.7rem; opacity:0.5; margin-top:5px;">Hold to Reset Today</p>
    </div>

    <div style="text-align: center; margin: 20px;">
        <a href="auto-jap.html" class="auto-link">Auto-Jap Mode →</a>
    </div>

    <div class="glass-card">
        <span style="font-size:0.75rem; font-weight:700; opacity:0.6;">WEEKLY ACTIVITY</span>
        <div class="report-grid" id="report-grid"></div>
    </div>

    <button class="jap-btn" onclick="downloadBhaktiCard()" style="font-size: 1rem; padding: 12px; margin-top: 10px;">📤 SHARE CARD</button>

    <div class="badge-row">
        <span class="badge" id="b1">🎖️</span>
        <span class="badge" id="b2">🛡️</span>
        <span class="badge" id="b3">👑</span>
    </div>

    <div class="glass-card" style="margin-top:15px; font-style:italic; font-size:0.85rem;" id="gita-quote">
        "Karma karo, fal ni chinta na karo. - Shree Krishna"
    </div>

    <footer style="margin-top:40px; text-align:center; padding:20px; opacity:0.7; font-size:0.8rem;">
        DESIGNED BY <b style="color:var(--p)">VISHVAM PRAJAPATI</b> <br>
        <span style="font-family:'Crimson Pro', serif; font-size:1.1rem; color:var(--s)">🌸 Radhe Radhe 🌸</span>
    </footer>

    <div id="bhakti-card-hidden">
        <h3>MANTRA JAP CERTIFICATE</h3>
        <h1 id="card-mantra" style="font-size:3rem; color:var(--p);">Radha Radha</h1>
        <p>Total Jap: <span id="card-total">0</span></p>
        <p>Streak: <span id="card-streak">0</span> Days</p>
    </div>

    <audio id="mantra-audio"></audio>
    <audio id="bg-audio" loop src="/static/audio/bansuri_bg.mp3"></audio>

    <script>
        // 1. User ID Logic - Har phone mate unique ID
        let userId = localStorage.getItem('jap_user_id');
        if (!userId) {
            userId = 'u_' + Math.random().toString(36).substr(2, 9) + Date.now();
            localStorage.setItem('jap_user_id', userId);
        }

        let curr = 0, total = 0, goal = 108, bgmOn = false, currentTheme = 'kailash', hTimer;
        const quotes = ["Karma karo, fal ni chinta na karo.", "Mann shant hoy to badhu jiti shakay.", "Radhe Radhe bolva thi mann shant thay."];
        const getBaseUrl = () => window.location.origin;

        window.onload = () => {
            fetch(`${getBaseUrl()}/get_count?user_id=${userId}`)
                .then(r => r.json())
                .then(d => {
                    curr = d.current_count;
                    total = d.total_count;
                    document.getElementById('count-num').innerText = curr;
                    document.getElementById('total-c').innerText = total;
                    document.getElementById('streak').innerText = d.streak || 0;
                    updateUI();
                    updateReport(d.history, d.today);
                });

            const darkModeSaved = localStorage.getItem('darkMode');
            if (darkModeSaved === 'false') {
                document.body.classList.add('light-mode');
                document.getElementById('mode-icon').innerText = "☀️";
            }
            
            document.getElementById('notif-time').value = localStorage.getItem('pTime') || "";
            changeMantra();
            setT(currentTheme);
            setInterval(checkNotif, 60000);
        };

        function toggleMode() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('darkMode', !isLight);
            document.getElementById('mode-icon').innerText = isLight ? "☀️" : "🌙";
            setT(currentTheme);
        }

        function setT(t) {
            currentTheme = t;
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            const isLight = document.body.classList.contains('light-mode');
            const root = document.documentElement;

            if (t === 'kailash') {
                root.style.setProperty('--p', isLight ? '#0077b6' : '#00b4d8');
                root.style.setProperty('--bg-grad', isLight ? 'linear-gradient(135deg, #e0f2f1 0%, #b2ebf2 100%)' : 'linear-gradient(135deg, #00101a 0%, #012a4a 50%, #01497c 100%)');
            } else if (t === 'vrindavan') {
                root.style.setProperty('--p', isLight ? '#2e7d32' : '#4caf50');
                root.style.setProperty('--bg-grad', isLight ? 'linear-gradient(135deg, #f1f8e9 0%, #dcedc8 100%)' : 'linear-gradient(135deg, #0a1a0a 0%, #1b3022 50%, #2d5a27 100%)');
            } else if (t === 'ayodha') {
                root.style.setProperty('--p', isLight ? '#ef6c00' : '#ff9800');
                root.style.setProperty('--bg-grad', isLight ? 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%)' : 'linear-gradient(135deg, #1a0f00 0%, #3e2723 50%, #5d4037 100%)');
            }
        }

        function handleJap() {
            curr++; total++; updateUI();
            const a = document.getElementById('mantra-audio');
            a.currentTime = 0; a.play().catch(() => { });
            if (curr % goal === 0) confetti();
            if (navigator.vibrate) navigator.vibrate(curr % goal === 0 ? 300 : 50);
            save();
        }

        function toggleBG() {
            const bg = document.getElementById('bg-audio');
            bgmOn ? bg.pause() : bg.play().catch(() => { });
            bgmOn = !bgmOn;
            document.getElementById('bgm-btn').innerText = bgmOn ? "🎵 ON" : "🎵 OFF";
        }

        function setVol(v) { document.getElementById('bg-audio').volume = v; }

        function updateUI() {
            document.getElementById('count-num').innerText = curr;
            document.getElementById('total-c').innerText = total;
            document.getElementById('goal-val').innerText = goal;
            if (total >= 108) document.getElementById('b1').classList.add('active');
            if (total >= 1000) document.getElementById('b2').classList.add('active');
            if (total >= 5000) document.getElementById('b3').classList.add('active');
        }

        function save() {
            fetch(`${getBaseUrl()}/update_count`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, current_count: curr, total_count: total })
            });
        }

        function startH() {
            document.getElementById('reset-btn').style.transform = "scale(0.9)";
            hTimer = setTimeout(() => {
                if (confirm("Aaje karela jap reset karva chhe?")) { curr = 0; updateUI(); save(); }
            }, 1500);
        }
        function stopH() { document.getElementById('reset-btn').style.transform = "scale(1)"; clearTimeout(hTimer); }

        function updateReport(history, today) {
            const grid = document.getElementById('report-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                let d = new Date(); d.setDate(d.getDate() - (6 - i));
                let dStr = d.toISOString().split('T')[0];
                let val = (dStr === today) ? curr : (history[dStr] || 0);
                let h = Math.min((val / goal) * 60, 60);
                grid.innerHTML += `<div style="display:flex; flex-direction:column; align-items:center; flex:1;"><div class="bar" style="height:${h}px"></div><span style="font-size:0.6rem; opacity:0.6;">${d.toLocaleDateString('en', { weekday: 'short' })}</span></div>`;
            }
        }

        function changeMantra() {
            const s = document.getElementById('mantra-select');
            document.getElementById('mantra-title').innerText = s.value;
            document.getElementById('mantra-audio').src = "/static/audio/" + s.options[s.selectedIndex].getAttribute('data-sound');
        }

        function updateGoal() { goal = Math.max(108, document.getElementById('goal-input').value); updateUI(); }
        function saveNotif() { localStorage.setItem('pTime', document.getElementById('notif-time').value); Notification.requestPermission(); }
        
        function checkNotif() {
            const setT = localStorage.getItem('pTime');
            const now = new Date();
            const nowT = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (setT === nowT && Notification.permission === "granted") {
                new Notification("Radhe Radhe!", { body: quotes[Math.floor(Math.random() * quotes.length)] });
            }
        }

        function downloadBhaktiCard() {
            document.getElementById('card-mantra').innerText = document.getElementById('mantra-select').value;
            document.getElementById('card-total').innerText = total;
            document.getElementById('card-streak').innerText = document.getElementById('streak').innerText;
            html2canvas(document.getElementById('bhakti-card-hidden')).then(canvas => {
                const link = document.createElement('a'); link.download = 'BhaktiCard.png'; link.href = canvas.toDataURL(); link.click();
            });
        }
    </script>
</body>

</html>
